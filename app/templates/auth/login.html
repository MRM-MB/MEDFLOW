{% extends "base.html" %}
{% block body %}
<div class="login-page">
  <!-- Decorative left panel -->
  <div class="login-hero">
    <div class="login-hero-bg" aria-hidden="true">
      <img src="/static/images/main_2.png" alt="" class="hero-bg-crosses">
    </div>
    <div class="login-hero-content">
      <div class="login-hero-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 64 64"><polyline points="8,34 20,34 25,20 32,46 39,28 44,34 56,34" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h1>MedFlow</h1>
      </div>
      <p class="login-hero-tagline">Smart Clinical Workflow Platform</p>
      <div class="login-hero-illustration">
        <img src="/static/images/main_1.png" alt="" class="hero-img-main">
      </div>
    </div>
  </div>

  <!-- Login form panel -->
  <div class="login-form-panel">
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="login-subtitle">Sign in to your account</p>

      {% if message %}
      <div class="alert alert-info">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="alert alert-info" style="background:#fef2f2;color:#991b1b;border-color:#fecaca;">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
