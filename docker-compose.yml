version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
      - .env
    environment:
      LOCAL_LLM_ENDPOINT: http://ollama:11434
      WHISPER_API_URL: http://whisper:8001
      USE_REAL_WHISPER_STREAMING: "true"
      LLM_MODEL_NAME: qwen3:8b
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM_EMAIL: no-reply@example.com
      SMTP_FROM_NAME: OPD-Vertex
    volumes:
      - ./:/workspace
      - model-cache:/workspace/app/models
    depends_on:
      - mysql
      - mongo
      - whisper
      - ollama
      - mailhog

  whisper:
    build:
      context: .
      dockerfile: whisper_api/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - whisper-models:/whisper-api/models
      - ./whisper_api:/whisper-api/whisper_api
    environment:
      HF_HOME: /whisper-api/models
      PYTHONUNBUFFERED: "1"
      WHISPER_MODEL_NAME: large-v3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: opd_vertex
      MYSQL_USER: opd_user
      MYSQL_PASSWORD: opd_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

volumes:
  mysql-data:
  mongo-data:
  model-cache:
  whisper-models:
  ollama-data:
